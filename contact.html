<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Ham Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">...</header>

    <section style="padding-top: 150px;">
        <div class="container">
            <h2 class="text-center" data-aos="fade-up">Get in Touch</h2>
            <div class="contact-grid">
                <div class="contact-info" data-aos="fade-right">
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-map-pin"></i></div>
                        <div class="info-text"><h4>Visit Us</h4><p>Konyokonyo, Juba, South Sudan</p></div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="info-text"><h4>Call Us</h4><p>+211 925 888 028</p></div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-envelope"></i></div>
                        <div class="info-text"><h4>Email Us</h4><p>info@hamconstruction.com</p></div>
                    </div>
                </div>
                <div class="contact-form" data-aos="fade-left">
                    <form id="contactForm">
                        <div class="form-group"><input type="text" placeholder="Your Name" required></div>
                        <div class="form-group"><input type="email" placeholder="Email Address" required></div>
                        <div class="form-group"><input type="tel" placeholder="Phone Number"></div>
                        <div class="form-group"><textarea rows="5" placeholder="Your Message" required></textarea></div>
                        <button type="submit" class="btn btn-block">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section class="cta">
        <div class="container">
            <h2>Prefer to Email Directly?</h2>
            <p>Send us an email at <strong>info@hamconstruction.com</strong> and we'll respond within 24 hours.</p>
            <a href="mailto:info@hamconstruction.com" class="btn btn-outline-light">Send Us Email</a>
        </div>
    </section>

    <footer>...</footer>
    <div class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
